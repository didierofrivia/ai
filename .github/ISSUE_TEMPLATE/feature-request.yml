name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement", "triage/needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should be added or changed?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this needed?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - AI Inference
        - Agentic Protocols (MCP/A2A)
        - Provider APIs (OpenAI/Anthropic)
        - Response Store
        - AI Guardrails
        - Token Usage
        - Prompt Enrichment
        - Server / Build
        - Other
  - type: input
    id: parent-epic
    attributes:
      label: Parent Epic (optional)
      description: "Issue number if this belongs under an epic"
      placeholder: "#484"
